<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validation Form</title>
    <!-- ============== STYLE CSS ============ -->
    <link rel="stylesheet" href="style.css" />
    <!-- ============= REMIX ICONS ==============  -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="form-container" id="form-container">
      <i class="ri-send-ins-line icon"></i>
      <form action="/action" class="form-data">
        <label for="name">Name: </label>
        <input type="text" name="name" id="name" placeholder="enter your name" required />
        <label for="number">Number: </label>
        <input type="number" name="number" id="number"  placeholder="0811 1111 1111" required />
        <label for="email">Email: </label>
        <input type="email" name="email" id="email"  placeholder="youremail@gmail.com" required />
        <label for="message">Enter your message here: </label>
        <textarea
          name="message"
          id="message"
          rows="7"
          cols="32"
           placeholder="enter your message here"
          required

        ></textarea>
      </form>
    </div>
    <!-- ================ SCRIPT JS ==============  -->
    <script src="app.js"></script>
  </body>
</html>
